<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MP Renewable Energy Intelligence</title>
</head>
<body style="margin:0;padding:0;background:#000;">
<!--
  MADEPARTNERS Renewable Energy Market Intelligence — GitHub Pages build (latest)
  Read-only. Fetches projects.json + projects-prev.json from the SAME repo (same origin, no auth).
  Features: HV + Data Centre badges, multi-select status, reset filters, change highlighting,
  single left pin (per-viewer localStorage), Selected Project tab.
  Live at https://marceloakstein.github.io/bd-intel-x7k2/
-->
<div id="mp-root">Loading dashboard…</div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const PROJECTS_URL = "projects.json";
const PREV_URL     = "projects-prev.json";
const LASTSCAN_URL = "last-scan.json";
const PIN_KEY      = "mp-pins-v1";
const OVERRIDE_KEY = "mp-overrides-v1";
const C = {
  yellow:"#FDB422", black:"#000000", white:"#FFFFFF",
  card:"#0d0d0d", border:"#1e1e1e", muted:"#444444",
  newColor:"#4ADE80", updatedColor:"#38BDF8",
  pinActive:"#FF5CA8", // bright pink — clearly distinct from faded grey unpinned pin
};
function hasHVEquipment(p){
  const hay=[...(p.assetTypes||[]),p.summary||"",p.mpEngagementWindow||"",...(p.mpServices||[])].join(" ").toLowerCase();
  return /transformer|circuit breaker|circuit-breaker|switchgear|gis\b|substation|hv transmission|high.?voltage|\bhv\b|grid connection|converter station/.test(hay);
}
function isDataCentre(p){
  const hay=[...(p.assetTypes||[]),p.summary||"",p.projectName||"",...(p.companies||[])].join(" ").toLowerCase();
  return /data ?cent(er|re)|hyperscale|\bdc\b|colocation|colo\b|cloud campus/.test(hay);
}
function computeChangeStatus(cur, prev){
  const prevMap=new Map((prev||[]).map(p=>[p.projectName.toLowerCase(),p]));
  const watch=["procurementStatus","procurementStart","priority","capacityMW","mpEngagementWindow","projectValue"];
  return cur.map(p=>{
    const pr=prevMap.get((p.projectName||"").toLowerCase());
    if(!pr) return {...p,_changeStatus:"new",_changedFields:[]};
    const cf=watch.filter(f=>String(p[f]??"")!==String(pr[f]??""));
    return {...p,_changeStatus:cf.length?"updated":null,_changedFields:cf};
  });
}
function Badge({text,type}){
  const map={
    priority_High:{bg:C.yellow,color:C.black,border:"none"},
    priority_Medium:{bg:"#1c1c00",color:C.yellow,border:"1px solid "+C.yellow},
    priority_Low:{bg:"#151515",color:"#555",border:"1px solid #2a2a2a"},
    status_PreTender:{bg:"#0c200c",color:"#5cb85c",border:"1px solid #5cb85c"},
    status_TenderActive:{bg:C.yellow,color:C.black,border:"none"},
    status_Awarded:{bg:"#0c0c25",color:"#6699ff",border:"1px solid #6699ff"},
    status_UnderConstruction:{bg:"#200e00",color:"#ff9940",border:"1px solid #ff9940"},
    status_Planning:{bg:"#151515",color:"#666",border:"1px solid #2a2a2a"},
  };
  const raw=(text||"");
  const norm=raw.replace(/[\s\-\/]/g,"");
  let key=type+"_"+norm;
  if(type==="status"&&!map[key]){
    const low=raw.toLowerCase();
    if(low.startsWith("pre-tender")||low.startsWith("pretender"))key="status_PreTender";
    else if(low.startsWith("tender active"))key="status_TenderActive";
    else if(low.startsWith("awarded"))key="status_Awarded";
    else if(low.startsWith("under construction"))key="status_UnderConstruction";
    else if(low.startsWith("planning"))key="status_Planning";
  }
  const s=map[key]||{bg:"#1a1a1a",color:"#666",border:"1px solid #2a2a2a"};
  const isStatus=type==="status";
  return <span title={raw} style={{background:s.bg,color:s.color,border:s.border,padding:"2px 6px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.4px",display:"inline-block",lineHeight:1.25,maxWidth:isStatus?"95px":"none",whiteSpace:isStatus?"normal":"nowrap",overflowWrap:isStatus?"break-word":"normal"}}>{text}</span>;
}
function HVBadge(){return <span title="HV transformers / circuit breakers — MP core experience" style={{background:"#2a1500",color:C.yellow,border:"1px solid "+C.yellow,padding:"2px 7px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.6px",display:"inline-block",whiteSpace:"nowrap"}}>⚡ HV EQUIP</span>;}
function DCBadge(){return <span title="Data centre — grid connection, substation & transmission opportunity" style={{background:"#0a1a2a",color:"#7cc4ff",border:"1px solid #7cc4ff",padding:"2px 7px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.6px",display:"inline-block",whiteSpace:"nowrap"}}>🖥 DATA CENTRE</span>;}
function ConfidenceDot({confidence}){
  if(!confidence)return null;
  const map={high:{c:"#4ADE80",t:"High confidence — AI verified with 2025-2026 source"},medium:{c:"#FDB422",t:"Medium confidence — based on 2024 source, may be slightly stale"},low:{c:"#ff5555",t:"⚠ Low confidence — pre-2024 source or inferred. Verify manually."}};
  const {c="#555",t=confidence}=map[confidence]||{};
  return <span title={t} style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:c,verticalAlign:"middle",marginLeft:"3px",flexShrink:0,cursor:"help"}}/>;
}
function OverrideBadge(){return <span title="Status manually overridden by user — not from AI scan" style={{background:"#1a0030",color:"#cc77ff",border:"1px dashed #cc77ff",padding:"1px 5px",fontSize:"8px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.4px",display:"inline-block",whiteSpace:"nowrap"}}>✎ OVERRIDE</span>;}
function ChangeBadge({status}){
  if(status==="new")return <span style={{background:"#0d2914",color:C.newColor,border:"1px solid "+C.newColor,padding:"2px 7px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.6px",whiteSpace:"nowrap"}}>🆕 NEW</span>;
  if(status==="updated")return <span style={{background:"#0a1f29",color:C.updatedColor,border:"1px solid "+C.updatedColor,padding:"2px 7px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.6px",whiteSpace:"nowrap"}}>↻ UPDATED</span>;
  return null;
}
const Flag=({country})=><span style={{fontSize:"14px",lineHeight:1}}>{country==="Australia"?"🇦🇺":country==="Brazil"?"🇧🇷":"🌐"}</span>;
function StatCard({value,label,accent,color}){return <div><div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"30px",color:color||(accent?C.yellow:C.white),lineHeight:1}}>{value}</div><div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",marginTop:"4px"}}>{label}</div></div>;}
const SectionLabel=({children})=><div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:C.yellow,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:"bold",marginBottom:"6px",borderBottom:"1px solid "+C.border,paddingBottom:"5px"}}>{children}</div>;
function DetailPanel({project:p,onClose,onPinToggle,onSetOverride,onClearOverride}){
  if(!p)return null;
  const [overrideDraft,setOverrideDraft]=React.useState(p._overrideMeta?.status||p.procurementStatus||"");
  const fmtCo=(v)=>Array.isArray(v)?v.filter(Boolean).join(", "):(v||"");
  const rows=[
    {label:"Summary",val:p.summary},
    {label:"Asset Types",val:(p.assetTypes||[]).join(", ")},
    {label:"Owner / Developer",val:fmtCo(p.owner)},
    {label:"EPC Contractor",val:fmtCo(p.epcContractor)},
    {label:"Financiers / Lenders",val:fmtCo(p.financiers||p.fundingSources)},
    {label:"All Companies",val:(!p.owner&&!p.epcContractor&&!p.financiers)?fmtCo(p.companies):""},
    {label:"MP Services",val:(p.mpServices||[]).join(", ")},
  ];
  return (
    <div style={{background:"#050505",borderTop:"3px solid "+C.yellow,marginTop:"16px"}}>
      <div style={{background:C.yellow,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"12px",textTransform:"uppercase",letterSpacing:"1.5px",color:C.black}}>PROJECT DETAIL — {(p.projectName||"").toUpperCase()}</div>
          {p._pinned&&<span style={{background:C.black,color:C.pinActive,fontSize:"9px",padding:"2px 7px",fontFamily:"Arial,sans-serif",fontWeight:"bold",letterSpacing:"1px"}}>📌 PINNED</span>}
          {hasHVEquipment(p)&&<HVBadge/>}
          {isDataCentre(p)&&<DCBadge/>}
          <ChangeBadge status={p._changeStatus}/>
        </div>
        {p._changeStatus==="updated"&&(p._changedFields||[]).length>0&&(
          <div style={{width:"100%",marginTop:"4px",fontFamily:"Arial,sans-serif",fontSize:"10px",color:"#0a4a5c",fontWeight:"bold",letterSpacing:"0.5px"}}>
            ↻ CHANGED THIS SCAN: {(p._changedFields||[]).map(f=>({procurementStart:"Procurement Start",procurementStatus:"Status",priority:"Priority",capacityMW:"Capacity",mpEngagementWindow:"Engagement Window",projectValue:"Project Value"}[f]||f)).join(" · ").toUpperCase()}
          </div>
        )}
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          {onPinToggle&&<button onClick={()=>onPinToggle(p)} style={{background:p._pinned?"none":C.black,border:p._pinned?"1px solid "+C.black:"none",color:p._pinned?C.black:C.yellow,fontSize:"11px",cursor:"pointer",padding:"4px 10px",fontFamily:"Arial,sans-serif",fontWeight:"bold",textTransform:"uppercase",letterSpacing:"0.8px"}}>{p._pinned?"UNPIN":"📌 PIN"}</button>}
          <button onClick={onClose} style={{background:"none",border:"none",color:C.black,fontSize:"18px",cursor:"pointer",lineHeight:1,padding:"0 4px"}}>✕</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
        <div style={{padding:"20px",borderRight:"1px solid "+C.border}}>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px",alignItems:"center"}}>
            <Flag country={p.country}/><Badge text={p.priority} type="priority"/><Badge text={p.procurementStatus} type="status"/>
            {p._overrideMeta&&<OverrideBadge/>}
            <ConfidenceDot confidence={p.statusConfidence}/>
            {p.statusConfidence==="low"&&<span style={{color:"#ff5555",fontSize:"10px",fontFamily:"Arial,sans-serif",fontWeight:"bold"}}>⚠ Verify status</span>}
            {p._aiStatus&&p._aiStatus!==p.procurementStatus&&<span style={{color:"#888",fontSize:"10px",fontFamily:"Arial,sans-serif"}}>AI: {p._aiStatus}</span>}
          </div>
          <div style={{background:C.card,borderLeft:"3px solid "+C.yellow,padding:"12px 14px",marginBottom:"16px"}}>
            <div style={{color:C.yellow,fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"6px"}}>⚡ MP ENGAGEMENT WINDOW</div>
            <div style={{color:C.white,fontFamily:"Arial,sans-serif",fontSize:"13px",fontWeight:"bold"}}>{p.mpEngagementWindow||"Review procurement timeline"}</div>
            <div style={{color:C.muted,fontFamily:"Arial,sans-serif",fontSize:"11px",marginTop:"4px"}}>Procurement start: {p.procurementStart||"TBD"}</div>
          </div>
          <div style={{background:"#0d0010",border:"1px dashed #6633aa",padding:"12px 14px",marginBottom:"16px"}}>
            <div style={{color:"#cc77ff",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"8px"}}>
              ✎ STATUS OVERRIDE {p._overrideMeta&&<span style={{color:"#777",fontWeight:"normal",textTransform:"none",letterSpacing:0}}>· set {p._overrideMeta.date}</span>}
            </div>
            <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
              <select value={overrideDraft} onChange={e=>setOverrideDraft(e.target.value)} style={{background:"#0d0d0d",color:"#ccc",border:"1px solid #6633aa",padding:"5px 8px",fontFamily:"Arial,sans-serif",fontSize:"11px",cursor:"pointer"}}>
                {["Pre-tender","Tender Active","Awarded","Under Construction","Planning"].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <button onClick={()=>onSetOverride&&onSetOverride(p.projectName,overrideDraft)} style={{background:"#6633aa",color:"#fff",border:"none",padding:"5px 12px",fontFamily:"Arial,sans-serif",fontSize:"10px",cursor:"pointer",fontWeight:"bold",textTransform:"uppercase",letterSpacing:"0.5px"}}>SAVE</button>
              {p._overrideMeta&&<button onClick={()=>onClearOverride&&onClearOverride(p.projectName)} style={{background:"none",color:"#888",border:"1px solid #333",padding:"5px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.5px"}}>CLEAR</button>}
            </div>
            <div style={{color:"#555",fontFamily:"Arial,sans-serif",fontSize:"10px",marginTop:"6px",lineHeight:1.5}}>
              {p._overrideMeta?`Your override: ${p._overrideMeta.status}. AI scan shows: ${p._aiStatus||"unknown"}.`:`AI scan status: ${p._aiStatus||p.procurementStatus}. Use this if you have ground-truth knowledge.`}
            </div>
          </div>
          {p.statusNote&&(
            <div style={{background:"#050d05",border:"1px solid #1a4a1a",padding:"10px 14px",marginBottom:"16px"}}>
              <div style={{color:"#4ADE80",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"6px"}}>🔍 AI STATUS EVIDENCE</div>
              <div style={{color:"#888",fontFamily:"Arial,sans-serif",fontSize:"11px",lineHeight:1.6}}>{p.statusNote}</div>
            </div>
          )}
          <div style={{marginBottom:"14px"}}>
            <SectionLabel>Location & Scale</SectionLabel>
            <div style={{color:"#aaa",fontFamily:"Arial,sans-serif",fontSize:"13px"}}>
              {p.location}
              {p.capacityMW?<span style={{color:C.yellow,fontWeight:"bold"}}> · {Number(p.capacityMW).toLocaleString()} MW</span>:""}
              {p.projectValue?<span style={{color:"#777"}}> · {p.projectValue}</span>:""}
            </div>
          </div>
          {(p.mpServices||[]).length>0&&(
            <div><SectionLabel>MadePartners Services</SectionLabel>
              <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                {p.mpServices.map((s,i)=><span key={i} style={{border:"1px solid "+C.yellow,color:C.yellow,fontSize:"10px",padding:"3px 8px",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.5px"}}>{s}</span>)}
              </div>
            </div>
          )}
        </div>
        <div style={{padding:"20px"}}>
          {rows.filter(r=>r.val).map(({label,val})=>(
            <div key={label} style={{marginBottom:"14px"}}>
              <SectionLabel>{label}</SectionLabel>
              <div style={{color:"#bbb",fontFamily:"Arial,sans-serif",fontSize:"12px",lineHeight:"1.7"}}>{val}</div>
            </div>
          ))}
          {p.sourceUrl&&<div style={{marginTop:"8px"}}><a href={p.sourceUrl} target="_blank" rel="noreferrer" style={{color:C.yellow,fontFamily:"Arial,sans-serif",fontSize:"12px",textDecoration:"none"}}>→ View source article</a></div>}
        </div>
      </div>
    </div>
  );
}
function TimelineView({projects,onSelect,selected,onPinToggle}){
  // Buckets by mpEngagementWindow END date — today ≈ H1 2026
  // Using engagement window end (not procurementStart) gives 0 TBDs on current data.
  const buckets=["🚨 Act Now (Window ≤H1 2026)","H2 2026","H1 2027","H2 2027","2028+","TBD"];

  function parseH(str){
    const m=(str||"").match(/H([12])\s*(\d{4})/i);
    return m?{h:+m[1],year:+m[2]}:null;
  }

  const assign=(p)=>{
    const ew=(p.mpEngagementWindow||"").trim();
    if(!ew||/^(tbd|unknown|review procurement timeline)$/i.test(ew))return"TBD";
    // Extract ALL H-tokens; use the LAST one as the end of the window
    const tokens=(ew.match(/H[12]\s*\d{4}/gi)||[]);
    const end=tokens.length?parseH(tokens[tokens.length-1]):null;
    if(!end)return"TBD";
    // Bucket by end date relative to today (H1 2026 = Jan–Jun 2026)
    if(end.year<2026||(end.year===2026&&end.h<=1))return"🚨 Act Now (Window ≤H1 2026)";
    if(end.year===2026)return"H2 2026";
    if(end.year===2027&&end.h===1)return"H1 2027";
    if(end.year===2027)return"H2 2027";
    return"2028+";
  };

  const grouped={};buckets.forEach(b=>grouped[b]=[]);
  projects.forEach(p=>grouped[assign(p)].push(p));
  const active=buckets.filter(b=>grouped[b].length>0);
  const bc=(p)=>p._pinned?C.pinActive:p._changeStatus==="new"?C.newColor:p._changeStatus==="updated"?C.updatedColor:p.priority==="High"?C.yellow:p.priority==="Medium"?"#444":"#222";

  const bucketColor=(bucket,bi)=>{
    if(bucket.startsWith("🚨"))return"#ff5555";
    if(bi===0)return C.yellow;
    return"#777";
  };

  return (
    <div>
      <div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"24px",paddingBottom:"12px",borderBottom:"1px solid "+C.border}}>MADEPARTNERS ENGAGEMENT TIMELINE — GROUPED BY WHEN THE OUTREACH WINDOW CLOSES · TODAY H1 2026</div>
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",left:"130px",top:0,bottom:0,width:"2px",background:"linear-gradient(to bottom, #ff5555, "+C.yellow+", #222)"}}/>
        {active.map((bucket,bi)=>(
          <div key={bucket} style={{display:"flex",marginBottom:"20px"}}>
            <div style={{width:"131px",minWidth:"131px",paddingRight:"16px",paddingTop:"14px",textAlign:"right",position:"relative"}}>
              <div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"11px",color:bucketColor(bucket,bi),textTransform:"uppercase",lineHeight:1.3}}>{bucket}</div>
              <div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:"#333",marginTop:"3px"}}>{grouped[bucket].length} project{grouped[bucket].length!==1?"s":""}</div>
              <div style={{position:"absolute",right:"-7px",top:"15px",width:"12px",height:"12px",borderRadius:"50%",background:bucket.startsWith("🚨")?"#ff5555":bi===0?C.yellow:C.border,border:bi===0?"none":"2px solid "+C.muted,zIndex:1}}/>
            </div>
            <div style={{flex:1,paddingLeft:"24px",display:"flex",flexDirection:"column",gap:"8px"}}>
              {grouped[bucket].map((p,pi)=>(
                <div key={pi} style={{position:"relative"}}>
                  <div onClick={()=>onSelect(p)} style={{background:selected&&selected.projectName===p.projectName?"#1a1400":C.card,padding:"12px 16px",paddingRight:"44px",cursor:"pointer",border:selected&&selected.projectName===p.projectName?"1px solid "+C.yellow:"1px solid "+C.border,borderLeftWidth:"4px",borderLeftColor:bc(p)}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
                      <div style={{flex:1}}>
                        <div style={{color:C.white,fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"13px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                          <button onClick={e=>{e.stopPropagation();onPinToggle(p);}} title={p._pinned?"Unpin":"Pin"} style={{background:"none",border:"none",color:p._pinned?C.pinActive:"#777",opacity:p._pinned?1:0.55,fontSize:"13px",cursor:"pointer",padding:0,lineHeight:1,filter:p._pinned?"drop-shadow(0 0 3px "+C.pinActive+")":"none"}}>📌</button>
                          <Flag country={p.country}/> {p.projectName}
                          {hasHVEquipment(p)&&<HVBadge/>}
                          {isDataCentre(p)&&<DCBadge/>}
                          <ChangeBadge status={p._changeStatus}/>
                        </div>
                        <div style={{color:"#666",fontFamily:"Arial,sans-serif",fontSize:"11px",marginTop:"3px"}}>{p.location}{p.capacityMW?" · "+Number(p.capacityMW).toLocaleString()+" MW":""}{p.projectValue?" · "+p.projectValue:""}</div>
                      </div>
                      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                        <Badge text={p.priority} type="priority"/><Badge text={p.procurementStatus} type="status"/><ConfidenceDot confidence={p.statusConfidence}/>{p._overrideMeta&&<OverrideBadge/>}
                      </div>
                    </div>
                    <div style={{marginTop:"10px",background:"#080800",borderLeft:"2px solid "+C.yellow,padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"11px",color:C.yellow,fontWeight:"bold"}}>⚡ {p.mpEngagementWindow||"Review procurement timeline"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
function App(){
  const [projects,setProjects]=useState([]);
  const [lastScan,setLastScan]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [pins,setPins]=useState({});
  const [overrides,setOverrides]=useState({});
  const [tab,setTab]=useState("table");
  const [selected,setSelected]=useState(null);
  const [fSearch,setFSearch]=useState("");
  const [fCountry,setFCountry]=useState("All");
  const [fPriority,setFPriority]=useState("All");
  const [fStatus,setFStatus]=useState([]);
  const [fChange,setFChange]=useState("All");
  const [fHV,setFHV]=useState(false);
  const [fDC,setFDC]=useState(false);
  const [fLowConf,setFLowConf]=useState(false);
  const [statusOpen,setStatusOpen]=useState(false);
  const [sortKey,setSortKey]=useState("priority");
  const [sortDir,setSortDir]=useState("asc");
  useEffect(()=>{
    try{const raw=localStorage.getItem(PIN_KEY);if(raw)setPins(JSON.parse(raw));}catch(e){}
    try{const raw=localStorage.getItem(OVERRIDE_KEY);if(raw)setOverrides(JSON.parse(raw));}catch(e){}
    (async()=>{
      let cur=[],prev=[];
      try{
        const r=await fetch(PROJECTS_URL,{headers:{"Accept":"application/json"}});
        if(!r.ok)throw new Error("Could not load projects.json (HTTP "+r.status+").");
        const d=await r.json();cur=d.projects||[];if(d.lastScan)setLastScan(d.lastScan);
      }catch(e){setError(e.message);}
      try{const rp=await fetch(PREV_URL,{headers:{"Accept":"application/json"}});if(rp.ok){const dp=await rp.json();prev=dp.projects||[];}}catch(e){}
      try{const r2=await fetch(LASTSCAN_URL,{headers:{"Accept":"application/json"}});if(r2.ok){const d2=await r2.json();if(d2.lastScan)setLastScan(d2.lastScan);}}catch(e){}
      setProjects(computeChangeStatus(cur,prev));
      setLoading(false);
    })();
  },[]);
  function savePins(np){setPins(np);try{localStorage.setItem(PIN_KEY,JSON.stringify(np));}catch(e){}}
  function pinToggle(p){const k=(p.projectName||"").toLowerCase();const np={...pins};if(np[k])delete np[k];else np[k]=true;savePins(np);}
  function saveOverrides(no){setOverrides(no);try{localStorage.setItem(OVERRIDE_KEY,JSON.stringify(no));}catch(e){}}
  function setStatusOverride(projectName,status){const k=(projectName||"").toLowerCase();const no={...overrides};no[k]={status,date:new Date().toISOString().slice(0,10)};saveOverrides(no);}
  function clearStatusOverride(projectName){const k=(projectName||"").toLowerCase();const no={...overrides};delete no[k];saveOverrides(no);}
  const isPinned=(p)=>!!pins[(p.projectName||"").toLowerCase()];
  const order={High:0,Medium:1,Low:2};
  const withPins=projects.map(p=>{
    const ov=overrides[(p.projectName||"").toLowerCase()];
    return {...p,_pinned:isPinned(p),_aiStatus:p.procurementStatus,_overrideMeta:ov||null,procurementStatus:ov?.status||p.procurementStatus};
  });
  const displayed=withPins
    .filter(p=>{if(!fSearch.trim())return true;const q=fSearch.trim().toLowerCase();return[p.projectName,p.location,p.owner,p.epcContractor,p.summary,...(p.companies||[]),...(p.assetTypes||[])].some(v=>(v||"").toLowerCase().includes(q));})
    .filter(p=>fCountry==="All"||p.country===fCountry)
    .filter(p=>fPriority==="All"||p.priority===fPriority)
    .filter(p=>fStatus.length===0||fStatus.includes(p.procurementStatus))
    .filter(p=>fChange==="All"||p._changeStatus===(fChange==="New"?"new":"updated"))
    .filter(p=>!fHV||hasHVEquipment(p))
    .filter(p=>!fDC||isDataCentre(p))
    .filter(p=>!fLowConf||(p.statusConfidence==="low"||!p.statusConfidence))
    .sort((a,b)=>{
      if(sortKey==="priority"){
        if(a._pinned!==b._pinned)return a._pinned?-1:1;
        const av=order[a.priority]??2,bv=order[b.priority]??2;
        if(av!==bv)return sortDir==="asc"?av-bv:bv-av;
        return (hasHVEquipment(a)?0:1)-(hasHVEquipment(b)?0:1);
      }
      if(sortKey==="mpEngagementWindow"){
        const rank=(s)=>{
          const t=(s||"").toLowerCase();
          if(/immediate|engage now|\bnow\b|urgent|asap/.test(t))return 0;
          const m=t.match(/(\d+)\s*month/);if(m)return 1+parseInt(m[1],10)/100;
          if(/q[1-4]\s*20\d{2}|h[12]\s*20\d{2}/.test(t))return 5;
          if(!t||t==="—")return 999;
          return 50;
        };
        const ar=rank(a.mpEngagementWindow),br=rank(b.mpEngagementWindow);
        if(ar!==br)return sortDir==="asc"?ar-br:br-ar;
        const as=String(a.mpEngagementWindow||""),bs=String(b.mpEngagementWindow||"");
        return sortDir==="asc"?as.localeCompare(bs):bs.localeCompare(as);
      }
      let av,bv;
      if(sortKey==="capacityMW"){av=Number(a.capacityMW)||0;bv=Number(b.capacityMW)||0;}
      else{av=String(a[sortKey]||"");bv=String(b[sortKey]||"");}
      if(av<bv)return sortDir==="asc"?-1:1;
      if(av>bv)return sortDir==="asc"?1:-1;
      return 0;
    });
  function toggleSort(k){if(sortKey===k)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(k);setSortDir("asc");}}
  function resetFilters(){setFSearch("");setFCountry("All");setFPriority("All");setFStatus([]);setFChange("All");setFHV(false);setFDC(false);setFLowConf(false);}
  const anyFilter=fSearch.trim()!=""||fCountry!=="All"||fPriority!=="All"||fStatus.length>0||fChange!=="All"||fHV||fDC||fLowConf;
  function openProject(p){setSelected(p);setTab("detail");}
  function closeDetail(){setSelected(null);if(tab==="detail")setTab("table");}
  const fmt=iso=>{
    if(!iso)return "Unknown";
    const d=new Date(iso);
    if(isNaN(d.getTime()))return String(iso);
    return d.toLocaleString("en-AU",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
  };
  const TD=(e={})=>({padding:"8px 7px",fontFamily:"Arial,sans-serif",fontSize:"12px",borderBottom:"1px solid "+C.border,verticalAlign:"top",...e});
  const hl=(p,f,e={})=>(p._changedFields||[]).includes(f)?{...e,color:C.updatedColor}:e;
  const coList=(v)=>{
    if(!v)return "";
    if(Array.isArray(v))return v.filter(Boolean).join(", ");
    return String(v);
  };
  const ColHead=({label,k,style={}})=>(
    <th onClick={()=>toggleSort(k)} style={{padding:"10px 12px",textAlign:"left",background:C.yellow,color:C.black,fontWeight:"bold",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.6px",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",fontFamily:"Arial,sans-serif",...style}}>
      {label}<span style={{marginLeft:"4px",color:sortKey===k?C.black:"#a88000"}}>{sortKey===k?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>
    </th>
  );
  const auCount=withPins.filter(p=>p.country==="Australia").length;
  const brCount=withPins.filter(p=>p.country==="Brazil").length;
  const highCount=withPins.filter(p=>p.priority==="High").length;
  const hvCount=withPins.filter(hasHVEquipment).length;
  const dcCount=withPins.filter(isDataCentre).length;
  const newCount=withPins.filter(p=>p._changeStatus==="new").length;
  const updCount=withPins.filter(p=>p._changeStatus==="updated").length;
  const pinCount=withPins.filter(p=>p._pinned).length;
  const lowConfCount=withPins.filter(p=>p.statusConfidence==="low").length;
  const overrideCount=withPins.filter(p=>p._overrideMeta).length;
  return (
    <div style={{background:C.black,minHeight:"100vh",color:C.white,fontFamily:"Arial,sans-serif"}}>
      <div style={{background:C.black,borderBottom:"3px solid "+C.yellow,padding:"18px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"16px"}}>
        <div>
          <div style={{display:"flex",alignItems:"baseline"}}>
            <span style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:900,fontSize:"28px",color:C.yellow,letterSpacing:"5px"}}>MADE</span>
            <span style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:900,fontSize:"28px",color:C.white,letterSpacing:"4px"}}>PARTNERS</span>
          </div>
          <div style={{color:"#3a3a3a",fontFamily:"Arial,sans-serif",fontSize:"10px",letterSpacing:"3.5px",textTransform:"uppercase",marginTop:"4px"}}>RENEWABLE ENERGY MARKET INTELLIGENCE · AUSTRALIA & BRAZIL</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:C.yellow,fontFamily:"Arial,sans-serif",fontSize:"11px",fontWeight:"bold",textTransform:"uppercase",letterSpacing:"1px"}}>Auto-updated weekly · Sundays</div>
          {(()=>{const stale=lastScan&&(Date.now()-new Date(lastScan).getTime())>30*24*60*60*1000;return(<><div style={{color:"#2e2e2e",fontSize:"11px",fontFamily:"Arial,sans-serif",marginTop:"4px"}}>Last scan: <span style={{color:stale?"#ff5555":"#555"}}>{fmt(lastScan)}</span></div>{stale&&<div style={{color:"#ff5555",fontSize:"10px",fontFamily:"Arial,sans-serif",marginTop:"2px",fontWeight:"bold",letterSpacing:"0.5px"}}>⚠ DATA MAY BE STALE</div>}</>);})()}
        </div>
      </div>
      {loading&&<div style={{padding:"60px 28px",textAlign:"center",color:C.yellow,fontFamily:"'Courier New',monospace",fontSize:"13px"}}>Loading intelligence data…</div>}
      {error&&<div style={{padding:"20px 28px",color:"#e05050",fontFamily:"'Courier New',monospace",fontSize:"12px",background:"#1a0808",borderBottom:"1px solid "+C.border}}>⚠ {error}</div>}
      {!loading&&(
        <div style={{background:"#060606",padding:"18px 28px",display:"flex",gap:"40px",flexWrap:"wrap",borderBottom:"1px solid "+C.border}}>
          <StatCard value={withPins.length} label="Total Projects" accent/>
          <StatCard value={auCount+" 🇦🇺"} label="Australia"/>
          <StatCard value={brCount+" 🇧🇷"} label="Brazil"/>
          <StatCard value={"📌 "+pinCount} label="Pinned" accent/>
          <StatCard value={"⚡ "+hvCount} label="HV Equip" accent/>
          {dcCount>0&&<StatCard value={"🖥 "+dcCount} label="Data Centres" color="#7cc4ff"/>}
          <StatCard value={highCount} label="High Priority"/>
          {(newCount>0||updCount>0)&&<><StatCard value={"🆕 "+newCount} label="New This Scan" color={C.newColor}/><StatCard value={"↻ "+updCount} label="Updated This Scan" color={C.updatedColor}/></>}
          {lowConfCount>0&&<StatCard value={"⚠ "+lowConfCount} label="Low Confidence" color="#ff5555"/>}
          {overrideCount>0&&<StatCard value={"✎ "+overrideCount} label="User Overrides" color="#cc77ff"/>}
        </div>
      )}
      {!loading&&(
        <div style={{background:"#060606",padding:"0 28px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"stretch",flexWrap:"wrap"}}>
          <div style={{display:"flex"}}>
            {[{key:"table",label:"PROJECT TABLE"},{key:"timeline",label:"ENGAGEMENT TIMELINE"},{key:"detail",label:"SELECTED PROJECT"}].map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} disabled={t.key==="detail"&&!selected} style={{background:"none",border:"none",borderBottom:tab===t.key?"3px solid "+C.yellow:"3px solid transparent",color:tab===t.key?C.yellow:(t.key==="detail"&&!selected)?"#1e1e1e":"#3a3a3a",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"11px",textTransform:"uppercase",letterSpacing:"1.5px",padding:"14px 20px",cursor:(t.key==="detail"&&!selected)?"default":"pointer",marginBottom:"-1px",display:"flex",alignItems:"center",gap:"6px"}}>
                {t.label}{t.key==="detail"&&selected&&<span style={{background:C.yellow,color:C.black,fontSize:"8px",padding:"1px 5px",borderRadius:"2px"}}>1</span>}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 0",flexWrap:"wrap"}}>
            <input value={fSearch} onChange={e=>setFSearch(e.target.value)} placeholder="🔍 Search projects…" style={{background:"#0d0d0d",color:C.white,border:"1px solid "+(fSearch.trim()?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"11px",outline:"none",width:"180px",letterSpacing:"0.3px"}}/>
            {[
              {val:fCountry,set:setFCountry,opts:["All","Australia","Brazil"],ph:"ALL COUNTRIES"},
              {val:fPriority,set:setFPriority,opts:["All","High","Medium","Low"],ph:"ALL PRIORITIES"},
              {val:fChange,set:setFChange,opts:["All","New","Updated"],ph:"ALL CHANGES"},
            ].map((f,i)=>(
              <select key={i} value={f.val} onChange={e=>f.set(e.target.value)} style={{background:"#0d0d0d",color:"#666",border:"1px solid "+C.border,padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>
                {f.opts.map(o=><option key={o} value={o}>{o==="All"?f.ph:o.toUpperCase()}</option>)}
              </select>
            ))}
            <div style={{position:"relative"}}>
              <button onClick={()=>setStatusOpen(o=>!o)} style={{background:fStatus.length?C.yellow:"#0d0d0d",color:fStatus.length?C.black:"#666",border:"1px solid "+(fStatus.length?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fStatus.length?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>
                {fStatus.length?"STATUS ("+fStatus.length+")":"ALL STATUSES"} ▾
              </button>
              {statusOpen&&(
                <div style={{position:"absolute",top:"32px",left:0,background:"#0d0d0d",border:"1px solid "+C.border,zIndex:50,minWidth:"180px",padding:"6px 0",boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
                  {["Pre-tender","Tender Active","Awarded","Under Construction","Planning"].map(s=>(
                    <label key={s} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 12px",cursor:"pointer",fontFamily:"Arial,sans-serif",fontSize:"11px",color:fStatus.includes(s)?C.yellow:"#888"}}>
                      <input type="checkbox" checked={fStatus.includes(s)} onChange={()=>setFStatus(cur=>cur.includes(s)?cur.filter(x=>x!==s):[...cur,s])} style={{accentColor:C.yellow}}/>
                      {s}
                    </label>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>setFHV(v=>!v)} style={{background:fHV?C.yellow:"#0d0d0d",color:fHV?C.black:"#666",border:"1px solid "+(fHV?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fHV?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>⚡ HV EQUIP ONLY</button>
            <button onClick={()=>setFDC(v=>!v)} style={{background:fDC?"#7cc4ff":"#0d0d0d",color:fDC?C.black:"#666",border:"1px solid "+(fDC?"#7cc4ff":C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fDC?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>🖥 DATA CENTRES ONLY</button>
            <button onClick={()=>setFLowConf(v=>!v)} style={{background:fLowConf?"#ff5555":"#0d0d0d",color:fLowConf?C.white:"#666",border:"1px solid "+(fLowConf?"#ff5555":C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fLowConf?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>⚠ UNVERIFIED ONLY</button>
            {anyFilter&&<button onClick={resetFilters} style={{background:"none",border:"1px solid #333",color:"#999",padding:"6px 12px",fontFamily:"Arial,sans-serif",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>✕ RESET FILTERS</button>}
          </div>
        </div>
      )}
      {!loading&&!error&&(
        <div style={{padding:"24px 28px"}}>
          {withPins.length===0?(
            <div style={{textAlign:"center",padding:"100px 20px",color:"#2a2a2a",fontFamily:"Arial,sans-serif"}}>No project data found yet.</div>
          ):tab==="table"?(
            <div>
              <div style={{color:"#333",fontFamily:"Arial,sans-serif",fontSize:"11px",marginBottom:"12px",display:"flex",gap:"16px",flexWrap:"wrap"}}>
                <span>Showing {displayed.length} of {withPins.length} projects — click a row for details · 📌 pin</span>
                <span style={{color:C.yellow}}>⚡ HV equip (MP core)</span>
                <span style={{color:"#7cc4ff"}}>🖥 data centre</span>
                <span style={{color:C.newColor}}>🆕 new</span>
                <span style={{color:C.updatedColor}}>↻ updated</span>
                <span style={{color:"#cc77ff"}}>✎ overridden</span>
                <span><span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:"#4ADE80",verticalAlign:"middle"}}></span> high conf</span>
                <span><span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:"#ff5555",verticalAlign:"middle"}}></span> low conf — verify</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:"1040px",tableLayout:"fixed"}}>
                  <thead><tr>
                    <ColHead label="Project Name" k="projectName" style={{width:"200px"}}/>
                    <ColHead label="Location" k="location" style={{width:"115px"}}/>
                    <ColHead label="Procure." k="procurementStart" style={{width:"78px"}}/>
                    <ColHead label="Status" k="procurementStatus" style={{width:"110px"}}/>
                    <ColHead label="MW" k="capacityMW" style={{width:"58px"}}/>
                    <ColHead label="Key Assets" k="assetTypes" style={{width:"120px"}}/>
                    <ColHead label="Owner / Developer" k="owner" style={{width:"130px"}}/>
                    <ColHead label="EPC" k="epcContractor" style={{width:"120px"}}/>
                    <ColHead label="Engage By" k="mpEngagementWindow" style={{width:"130px"}}/>
                    <ColHead label="Pri." k="priority" style={{width:"62px"}}/>
                  </tr></thead>
                  <tbody>
                    {displayed.map((p,i)=>{
                      const sel=selected&&selected.projectName===p.projectName;
                      const accent=sel||p._pinned?C.yellow:p._changeStatus==="new"?C.newColor:p._changeStatus==="updated"?C.updatedColor:null;
                      const open=()=>openProject(p);
                      return (
                        <tr key={i} style={{background:sel?"#1a1200":p._pinned?"#0a0800":i%2===0?"#070707":C.card,cursor:"pointer",borderLeft:accent?"3px solid "+accent:"3px solid transparent"}}>
                          <td onClick={open} style={TD({color:C.white,fontWeight:"bold",whiteSpace:"normal",overflowWrap:"break-word"})}>
                            <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                              <button onClick={e=>{e.stopPropagation();pinToggle(p);}} title={p._pinned?"Unpin":"Pin"} style={{background:"none",border:"none",color:p._pinned?C.pinActive:"#777",opacity:p._pinned?1:0.55,fontSize:p._pinned?"15px":"14px",cursor:"pointer",padding:0,lineHeight:1,filter:p._pinned?"drop-shadow(0 0 3px "+C.pinActive+")":"none"}}>📌</button>
                              <Flag country={p.country}/><span style={{fontSize:"12px"}}>{p.projectName}</span>{hasHVEquipment(p)&&<HVBadge/>}{isDataCentre(p)&&<DCBadge/>}<ChangeBadge status={p._changeStatus}/>
                            </div>
                          </td>
                          <td onClick={open} style={TD(hl(p,"location",{color:"#777",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"}))}>{p.location}</td>
                          <td onClick={open} style={TD(hl(p,"procurementStart",{color:C.yellow,fontWeight:"bold",padding:"9px 8px",whiteSpace:"normal",overflowWrap:"break-word",lineHeight:1.3,fontSize:"11px"}))}>{p.procurementStart||"TBD"}</td>
                          <td onClick={open} style={TD(hl(p,"procurementStatus",{}))}><div style={{display:"flex",alignItems:"center",gap:"4px",flexWrap:"wrap"}}><Badge text={p.procurementStatus} type="status"/><ConfidenceDot confidence={p.statusConfidence}/>{p._overrideMeta&&<OverrideBadge/>}</div></td>
                          <td onClick={open} style={TD(hl(p,"capacityMW",{color:C.yellow,whiteSpace:"nowrap",textAlign:"right",fontWeight:"bold",fontSize:"11px"}))}>{p.capacityMW?Number(p.capacityMW).toLocaleString():"—"}</td>
                          <td onClick={open} style={TD({color:"#888",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{(p.assetTypes||[]).join(", ")}</td>
                          <td onClick={open} style={TD({color:"#aaa",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{coList(p.owner)||(p.companies&&!p.epcContractor&&!p.financiers?coList(p.companies):"")||"—"}</td>
                          <td onClick={open} style={TD({color:"#999",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{coList(p.epcContractor)||"—"}</td>
                          <td onClick={open} style={TD(hl(p,"mpEngagementWindow",{color:"#bbb",fontWeight:"bold",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word",lineHeight:1.3}))}>{p.mpEngagementWindow||"—"}</td>
                          <td onClick={open} style={TD(hl(p,"priority",{}))}><Badge text={p.priority} type="priority"/></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ):tab==="timeline"?(
            <TimelineView projects={displayed} onSelect={openProject} selected={selected} onPinToggle={pinToggle}/>
          ):(
            selected?<DetailPanel project={{...selected,...withPins.find(p=>p.projectName===selected.projectName)||{}}} onClose={closeDetail} onPinToggle={pinToggle} onSetOverride={setStatusOverride} onClearOverride={clearStatusOverride}/>:(
              <div style={{textAlign:"center",padding:"100px 20px"}}>
                <div style={{fontSize:"48px",opacity:0.08,marginBottom:"16px"}}>👆</div>
                <div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"14px",color:"#1e1e1e",textTransform:"uppercase",letterSpacing:"3px"}}>NO PROJECT SELECTED</div>
                <div style={{fontFamily:"Arial,sans-serif",fontSize:"12px",color:"#2a2a2a",marginTop:"10px"}}>Click any project in the <strong style={{color:C.yellow}}>PROJECT TABLE</strong> or <strong style={{color:C.yellow}}>TIMELINE</strong> to view its details here.</div>
              </div>
            )
          )}
        </div>
      )}
      <div style={{borderTop:"1px solid "+C.border,padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px",fontFamily:"Arial,sans-serif",fontSize:"10px"}}>
        <span style={{color:"#222"}}>Commercial in Confidence · MADEPARTNERS Quality Solutions · ISO 9001 / 14001 / 45001</span>
        <span style={{color:C.yellow,letterSpacing:"1px"}}>WWW.MADEPARTNERS.COM</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("mp-root")).render(<App/>);
</script>
</body>
</html>
