  card:"#0d0d0d", border:"#1e1e1e", muted:"#888888",

function hasHVEquipment(p){
  const hay=[...(p.assetTypes||[]),p.summary||"",p.mpEngagementWindow||"",...(p.mpServices||[])].join(" ").toLowerCase();
  return /transformer|circuit breaker|circuit-breaker|switchgear|gis\b|substation|hv transmission|high.?voltage|\bhv\b|grid connection|converter station/.test(hay);
}
function isDataCentre(p){
  const hay=[...(p.assetTypes||[]),p.summary||"",p.projectName||"",...(p.companies||[])].join(" ").toLowerCase();
  return /data ?cent(er|re)|hyperscale|\bdc\b|colocation|colo\b|cloud campus/.test(hay);
}
function parseProcurementDate(s){
  if(!s||s==="TBD"||s==="")return null;
  const qm=s.match(/Q([1-4])\s*(\d{4})/i);
  if(qm){const mo=[0,3,6,9][parseInt(qm[1])-1];return new Date(parseInt(qm[2]),mo,1);}
  const hm=s.match(/H([12])\s*(\d{4})/i);
  if(hm){return new Date(parseInt(hm[2]),hm[1]==="1"?0:6,1);}
  const ym=s.match(/^(\d{4})$/);
  if(ym)return new Date(parseInt(ym[1]),0,1);
  return null;
}
function isStale(p){
  // Hide Cancelled projects and Under Construction projects where procurement started >6 months ago.
  // Planning and Pre-tender are NEVER hidden — they always represent future BD opportunity.
  if((p.procurementStatus||"")==="Cancelled")return true;
  if((p.procurementStatus||"")!=="Under Construction")return false;
  const d=parseProcurementDate(p.procurementStart);
  if(!d)return false;
  const cut=new Date();cut.setMonth(cut.getMonth()-6);
  return d<cut;
}
function hasDateStatusMismatch(p){
  // Informational flag only (DATE? badge) — no hiding.
  // Fires when Planning/Pre-tender has a procurementStart already in the past,
  // suggesting Gemini's date or status may need verification.
  const status=p.procurementStatus||"";
  if(status!=="Planning"&&status!=="Pre-tender")return false;
  const d=parseProcurementDate(p.procurementStart);
  if(!d)return false;
  return d<new Date();
}
function computeChangeStatus(cur, prev){
  const prevMap=new Map((prev||[]).map(p=>[p.projectName.toLowerCase(),p]));
  const watch=["procurementStatus","procurementStart","priority","capacityMW","mpEngagementWindow","projectValue"];
  return cur.map(p=>{
    const pr=prevMap.get((p.projectName||"").toLowerCase());
    if(!pr) return {...p,_changeStatus:"new",_changedFields:[]};
    const cf=watch.filter(f=>String(p[f]??"")!==String(pr[f]??""));
    return {...p,_changeStatus:cf.length?"updated":null,_changedFields:cf};
  });
}
function Badge({text,type}){
  const map={
    priority_High:{bg:C.yellow,color:C.black,border:"none"},
    priority_Medium:{bg:"#1c1c00",color:C.yellow,border:"1px solid "+C.yellow},
    priority_Low:{bg:"#151515",color:"#555",border:"1px solid #2a2a2a"},
    status_PreTender:{bg:"#0c200c",color:"#5cb85c",border:"1px solid #5cb85c"},
    status_TenderActive:{bg:C.yellow,color:C.black,border:"none"},
    status_Awarded:{bg:"#0c0c25",color:"#6699ff",border:"1px solid #6699ff"},
    status_UnderConstruction:{bg:"#200e00",color:"#ff9940",border:"1px solid #ff9940"},
    status_Planning:{bg:"#151515",color:"#666",border:"1px solid #2a2a2a"},
    status_Cancelled:{bg:"#1a0000",color:"#cc3333",border:"1px solid #cc3333"},
  };
  const raw=(text||"");
  const norm=raw.replace(/[\s\-\/]/g,"");
  let key=type+"_"+norm;
  if(type==="status"&&!map[key]){
    const low=raw.toLowerCase();
    if(low.startsWith("pre-tender")||low.startsWith("pretender"))key="status_PreTender";
    else if(low.startsWith("tender active"))key="status_TenderActive";
    else if(low.startsWith("awarded"))key="status_Awarded";
    else if(low.startsWith("under construction"))key="status_UnderConstruction";
    else if(low.startsWith("planning"))key="status_Planning";
    else if(low.startsWith("cancelled")||low.startsWith("canceled"))key="status_Cancelled";
  }
  const s=map[key]||{bg:"#1a1a1a",color:"#666",border:"1px solid #2a2a2a"};
  const isStatus=type==="status";
  return <span title={raw} style={{background:s.bg,color:s.color,border:s.border,padding:"2px 6px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.4px",display:"inline-block",lineHeight:1.25,maxWidth:isStatus?"95px":"none",whiteSpace:isStatus?"normal":"nowrap",overflowWrap:isStatus?"break-word":"normal"}}>{text}</span>;
}
function DCBadge(){return <span title="Data centre — grid connection, substation & transmission opportunity" style={{background:"#0a1a2a",color:"#7cc4ff",border:"1px solid #7cc4ff",padding:"2px 7px",fontSize:"9px",fontWeight:"bold",fontFamily:"Arial,sans-serif",textTransform:"uppercase",letterSpacing:"0.6px",display:"inline-block",whiteSpace:"nowrap"}}>🖥 DATA CENTRE</span>;}

}

}

function StatCard({value,label,accent,color}){return <div><div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"30px",color:color||(accent?C.yellow:C.white),lineHeight:1}}>{value}</div><div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",marginTop:"4px"}}>{label}</div></div>;}

  return (

          {p._pinned&&<span style={{background:C.black,color:C.pinActive,fontSize:"9px",padding:"2px 7px",fontFamily:"Arial,sans-serif",fontWeight:"bold",letterSpacing:"1px"}}>📌 PINNED</span>}

            ↻ CHANGED THIS SCAN: {(p._changedFields||[]).map(f=>({procurementStart:"Equip. Procurement",procurementStatus:"Status",priority:"Priority",capacityMW:"Capacity",mpEngagementWindow:"Engagement Window",projectValue:"Project Value"}[f]||f)).join(" · ").toUpperCase()}

}
function TimelineView({projects,onSelect,selected,onPinToggle}){
  // Dynamic buckets based on current date
  const _now=new Date();
  const _cy=_now.getFullYear();
  const _ch=_now.getMonth()<6?1:2;
  const _hLabel=(y,h)=>`H${h} ${y}`;
  const _nextH=(y,h)=>h===1?{y,h:2}:{y:y+1,h:1};
  // Build bucket list: Act Now + 4 future halves + year+ + TBD
  const _actNow=`🚨 Act Now (Window ≤H${_ch} ${_cy})`;
  const _futureBuckets=[];
  let _cur=_nextH(_cy,_ch);
  for(let i=0;i<4;i++){_futureBuckets.push(_hLabel(_cur.y,_cur.h));_cur=_nextH(_cur.y,_cur.h);}
  const _yearPlus=`${_cur.y}+`;
  const buckets=[_actNow,..._futureBuckets,_yearPlus,"TBD"];

  function parseH(str){
    const m=(str||"").match(/H([12])\s*(\d{4})/i);
    return m?{h:+m[1],year:+m[2]}:null;
  }

  const assign=(p)=>{
    const ew=(p.mpEngagementWindow||"").trim();
    if(!ew||/^(tbd|unknown|review procurement timeline)$/i.test(ew))return"TBD";
    const tokens=(ew.match(/H[12]\s*\d{4}/gi)||[]);
    const end=tokens.length?parseH(tokens[tokens.length-1]):null;
    if(!end)return"TBD";
    if(end.year<_cy||(end.year===_cy&&end.h<=_ch))return _actNow;
    for(const b of _futureBuckets){const p2=parseH(b);if(p2&&end.year===p2.year&&end.h===p2.h)return b;}
    return _yearPlus;
  };

  const grouped={};buckets.forEach(b=>grouped[b]=[]);
  projects.forEach(p=>grouped[assign(p)].push(p));
  const active=buckets.filter(b=>grouped[b].length>0);
  const bc=(p)=>p._pinned?C.pinActive:p._changeStatus==="new"?C.newColor:p._changeStatus==="updated"?C.updatedColor:p.priority==="High"?C.yellow:p.priority==="Medium"?"#444":"#222";

  const bucketColor=(bucket,bi)=>{
    if(bucket.startsWith("🚨"))return"#ff5555";
    if(bi===0)return C.yellow;
    return"#777";
  };

  return (
    <div>
      <div style={{fontFamily:"Arial,sans-serif",fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"24px",paddingBottom:"12px",borderBottom:"1px solid "+C.border}}>{`MADEPARTNERS ENGAGEMENT TIMELINE — GROUPED BY WHEN THE OUTREACH WINDOW CLOSES · TODAY H${_ch} ${_cy}`}</div>

        <div style={{background:"#060606",padding:"0 28px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"stretch",flexWrap:"wrap"}}>
          <div style={{display:"flex"}}>
            {[{key:"table",label:"PROJECT TABLE"},{key:"timeline",label:"ENGAGEMENT TIMELINE"},{key:"bd",label:"BD STRATEGY"},{key:"detail",label:"SELECTED PROJECT"}].map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} disabled={t.key==="detail"&&!selected} style={{background:"none",border:"none",borderBottom:tab===t.key?"3px solid "+C.yellow:"3px solid transparent",color:tab===t.key?C.yellow:(t.key==="detail"&&!selected)?"#444":"#bbb",fontFamily:"Arial,sans-serif",fontWeight:"bold",fontSize:"11px",textTransform:"uppercase",letterSpacing:"1.5px",padding:"14px 20px",cursor:(t.key==="detail"&&!selected)?"default":"pointer",marginBottom:"-1px",display:"flex",alignItems:"center",gap:"6px"}}>
                {t.label}{t.key==="detail"&&selected&&<span style={{background:C.yellow,color:C.black,fontSize:"8px",padding:"1px 5px",borderRadius:"2px"}}>1</span>}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 0",flexWrap:"wrap"}}>
            <input value={fSearch} onChange={e=>setFSearch(e.target.value)} placeholder="🔍 Search projects…" style={{background:"#0d0d0d",color:C.white,border:"1px solid "+(fSearch.trim()?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"11px",outline:"none",width:"180px",letterSpacing:"0.3px"}}/>
            {[
              {val:fCountry,set:setFCountry,opts:["All","Australia","Brazil"],ph:"ALL COUNTRIES"},
              {val:fChange,set:setFChange,opts:["All","New","Updated"],ph:"ALL CHANGES"},
            ].map((f,i)=>(
              <select key={i} value={f.val} onChange={e=>f.set(e.target.value)} style={{background:"#0d0d0d",color:"#bbb",border:"1px solid "+C.border,padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>
                {f.opts.map(o=><option key={o} value={o}>{o==="All"?f.ph:o.toUpperCase()}</option>)}
              </select>
            ))}
            <div style={{position:"relative"}}>
              <button onClick={()=>setStatusOpen(o=>!o)} style={{background:fStatus.length?C.yellow:"#0d0d0d",color:fStatus.length?C.black:"#bbb",border:"1px solid "+(fStatus.length?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fStatus.length?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>
                {fStatus.length?"STATUS ("+fStatus.length+")":"ALL STATUSES"} ▾
              </button>
              {statusOpen&&(
                <div style={{position:"absolute",top:"32px",left:0,background:"#0d0d0d",border:"1px solid "+C.border,zIndex:50,minWidth:"180px",padding:"6px 0",boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
                  {["Pre-tender","Tender Active","Awarded","Under Construction","Planning","Cancelled"].map(s=>(
                    <label key={s} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 12px",cursor:"pointer",fontFamily:"Arial,sans-serif",fontSize:"11px",color:fStatus.includes(s)?C.yellow:"#888"}}>
                      <input type="checkbox" checked={fStatus.includes(s)} onChange={()=>setFStatus(cur=>cur.includes(s)?cur.filter(x=>x!==s):[...cur,s])} style={{accentColor:C.yellow}}/>
                      {s}
                    </label>
                  ))}
                </div>
              )}
            </div>
<button onClick={()=>setFDC(v=>!v)} style={{background:fDC?"#7cc4ff":"#0d0d0d",color:fDC?C.black:"#bbb",border:"1px solid "+(fDC?"#7cc4ff":C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fDC?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>🖥 DATA CENTRES ONLY</button>
            <div style={{position:"relative"}}>
              <button onClick={()=>setProcStartOpen(o=>!o)} style={{background:fProcStart.length?C.yellow:"#0d0d0d",color:fProcStart.length?C.black:"#bbb",border:"1px solid "+(fProcStart.length?C.yellow:C.border),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fProcStart.length?"bold":"normal",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>
                {fProcStart.length?"PROC. DATE ("+fProcStart.length+")":"ALL PROC. DATES"} ▾
              </button>
              {procStartOpen&&(
                <div style={{position:"absolute",top:"32px",left:0,background:"#0d0d0d",border:"1px solid "+C.border,zIndex:50,minWidth:"160px",maxHeight:"260px",overflowY:"auto",padding:"6px 0",boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
                  {[...new Set(withPins.map(p=>p.procurementStart).filter(v=>v&&v!=="TBD"&&v!==""))].sort((a,b)=>{const da=parseProcurementDate(a),db=parseProcurementDate(b);return (da?da.getTime():Infinity)-(db?db.getTime():Infinity);}).map(s=>(
                    <label key={s} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 12px",cursor:"pointer",fontFamily:"Arial,sans-serif",fontSize:"11px",color:fProcStart.includes(s)?C.yellow:"#888"}}>
                      <input type="checkbox" checked={fProcStart.includes(s)} onChange={()=>setFProcStart(cur=>cur.includes(s)?cur.filter(x=>x!==s):[...cur,s])} style={{accentColor:C.yellow}}/>
                      {s}
                    </label>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>setFHideStale(v=>!v)} style={{background:fHideStale?"#0d0d0d":"#7c3aed",color:fHideStale?"#bbb":C.white,border:"1px solid "+(fHideStale?"#333":"#7c3aed"),padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:"10px",fontWeight:fHideStale?"normal":"bold",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}} title="Hides: Under Construction with procurement >12 months ago; Planning/Pre-tender with procurement date passed >3 months ago">{fHideStale?"🚧 SHOW STALE":"🚧 HIDE STALE"}</button>
            {anyFilter&&<button onClick={resetFilters} style={{background:"none",border:"1px solid #333",color:"#999",padding:"6px 12px",fontFamily:"Arial,sans-serif",fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer"}}>✕ RESET FILTERS</button>}
          </div>
        </div>
      )}
      {!loading&&!error&&(
        <div style={{padding:"24px 28px"}}>
          {withPins.length===0?(
            <div style={{textAlign:"center",padding:"100px 20px",color:"#2a2a2a",fontFamily:"Arial,sans-serif"}}>No project data found yet.</div>
          ):tab==="table"?(
            <div>
              <div style={{color:"#888",fontFamily:"Arial,sans-serif",fontSize:"11px",marginBottom:"12px",display:"flex",gap:"16px",flexWrap:"wrap"}}>
                <span>Showing {displayed.length} of {withPins.length} projects — click a row for details · 📌 pin</span>
<span style={{color:"#7cc4ff"}}>🖥 data centre</span>
                <span style={{color:C.newColor}}>🆕 new</span>
                <span style={{color:C.updatedColor}}>↻ updated</span>
                <span style={{color:"#cc77ff"}}>✎ overridden</span>
                <span><span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:"#4ADE80",verticalAlign:"middle"}}></span> high conf</span>
                <span><span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:"#ff5555",verticalAlign:"middle"}}></span> low conf — verify</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:"980px",tableLayout:"fixed"}}>
                  <thead><tr>
                    <ColHead label="Project Name" k="projectName" style={{width:"200px"}}/>
                    <ColHead label="Location" k="location" style={{width:"115px"}}/>
                    <ColHead label="Equip. Proc." k="procurementStart" style={{width:"88px"}}/>
                    <ColHead label="Status" k="procurementStatus" style={{width:"110px"}}/>
                    <ColHead label="MW" k="capacityMW" style={{width:"46px",textAlign:"center"}}/>
                    <ColHead label="Key Assets" k="assetTypes" style={{width:"120px"}}/>
                    <ColHead label="Owner / Developer" k="owner" style={{width:"130px"}}/>
                    <ColHead label="EPC / TENDERER" k="epcContractor" style={{width:"120px"}}/>
                  </tr></thead>
                  <tbody>
                    {displayed.map((p,i)=>{
                      const sel=selected&&selected.projectName===p.projectName;
                      const accent=sel||p._pinned?C.yellow:p._changeStatus==="new"?C.newColor:p._changeStatus==="updated"?C.updatedColor:null;
                      const open=()=>openProject(p);
                      return (
                        <tr key={i} style={{background:sel?"#1a1200":p._pinned?"#0a0800":i%2===0?"#070707":C.card,cursor:"pointer",borderLeft:accent?"3px solid "+accent:"3px solid transparent"}}>
                          <td onClick={open} style={TD({color:C.white,fontWeight:"bold",whiteSpace:"normal",overflowWrap:"break-word"})}>
                            <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                              <button onClick={e=>{e.stopPropagation();pinToggle(p);}} title={p._pinned?"Unpin":"Pin"} style={{background:"none",border:"none",color:p._pinned?C.pinActive:"#777",opacity:p._pinned?1:0.55,fontSize:p._pinned?"15px":"14px",cursor:"pointer",padding:0,lineHeight:1,filter:p._pinned?"drop-shadow(0 0 3px "+C.pinActive+")":"none"}}>📌</button>
                              <Flag country={p.country}/><span style={{fontSize:"12px"}}>{p.projectName}</span>{isDataCentre(p)&&<DCBadge/>}<ChangeBadge status={p._changeStatus}/>
                            </div>
                          </td>
                          <td onClick={open} style={TD(hl(p,"location",{color:"#ccc",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"}))}>{p.location}</td>
                          <td onClick={open} style={TD(hl(p,"procurementStart",{color:C.yellow,fontWeight:"bold",padding:"9px 8px",whiteSpace:"normal",overflowWrap:"break-word",lineHeight:1.3,fontSize:"11px"}))}>{p.procurementStart||"TBD"}</td>
                          <td onClick={open} style={TD(hl(p,"procurementStatus",{}))}><div style={{display:"flex",alignItems:"center",gap:"4px",flexWrap:"wrap"}}><Badge text={p.procurementStatus} type="status"/><ConfidenceDot confidence={p.statusConfidence}/>{p._overrideMeta&&<OverrideBadge/>}{hasDateStatusMismatch(p)&&<span title={"Equip. proc. date ("+p.procurementStart+") already passed but status is still "+p.procurementStatus+" — verify with source"} style={{color:"#f97316",fontSize:"9px",fontWeight:"bold",cursor:"help",letterSpacing:"0.3px",fontFamily:"Arial,sans-serif"}}>DATE?</span>}</div></td>
                          <td onClick={open} style={TD(hl(p,"capacityMW",{color:C.yellow,whiteSpace:"nowrap",textAlign:"center",fontWeight:"bold",fontSize:"11px"}))}>{p.capacityMW?Number(p.capacityMW).toLocaleString():"—"}</td>
                          <td onClick={open} style={TD({color:"#ccc",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{(p.assetTypes||[]).join(", ")}</td>
                          <td onClick={open} style={TD({color:"#ddd",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{coList(p.owner)||(p.companies&&!p.epcContractor&&!p.financiers?coList(p.companies):"")||"—"}</td>
                          <td onClick={open} style={TD({color:"#ccc",fontSize:"11px",whiteSpace:"normal",overflowWrap:"break-word"})}>{coList(p.epcContractor)||coList(p.companies)||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ):tab==="timeline"?(
            <TimelineView projects={displayed} onSelect={openProject} selected={selected} onPinToggle={pinToggle}/>
          ):tab==="bd"?(
            <BDView projects={withPins.filter(p=>p._pinned)} bdData={bdData} onSaveRow={saveBDRow} onSelect={openProject}/>
          ):(
            selected?<DetailPanel project={{...selected,...withPins.find(p=>p.projectName===selected.projectName)||{}}} onClose={closeDetail} onPinToggle={pinToggle} onSetOverride={setStatusOverride} onClearOverride={clearStatusOverride} onSetProcStart={setProcStartOverride} onSetEpc={setEpcOverride}/>:(
              <div style={{textAlign:"center",padding:"100px 20px"}}>
                <div style={{fontSize:"48px",opacity:0.08,marginBottom:"16px"}}>👆</div>
                <div style={{fontFamily:"'Calibri',Arial,sans-serif",fontWeight:"bold",fontSize:"14px",color:"#1e1e1e",textTransform:"uppercase",letterSpacing:"3px"}}>NO PROJECT SELECTED</div>
                <div style={{fontFamily:"Arial,sans-serif",fontSize:"12px",color:"#2a2a2a",marginTop:"10px"}}>Click any project in the <strong style={{color:C.yellow}}>PROJECT TABLE</strong> or <strong style={{color:C.yellow}}>TIMELINE</strong> to view its details here.</div>
              </div>
            )
          )}
        </div>
      )}
      <div style={{borderTop:"1px solid "+C.border,padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px",fontFamily:"Arial,sans-serif",fontSize:"10px"}}>
        <span style={{color:"#666"}}>Commercial in Confidence · MADEPARTNERS</span>
        <a href="https://www.madepartners.com" target="_blank" rel="noreferrer" style={{color:C.yellow,letterSpacing:"1px",textDecoration:"none"}}>WWW.MADEPARTNERS.COM</a>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("mp-root")).render(<App/>);
</script>
</body>
</html>
